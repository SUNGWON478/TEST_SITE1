<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기니피그 강성원 판독기</title>
  <meta name="description" content="Teachable Machine 기반 이미지 판독 사이트" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link href="/style.css" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script defer src="/main.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero panel">
      <p class="kicker">RETRO PHOTO LAB</p>
      <h1>기니피그 강성원 판독기</h1>
      <p class="desc">필름 감성 판독소. 사진 한 장으로 모델이 누구인지 판독합니다.</p>

      <div class="guinea-box" aria-hidden="true">
        <div class="guinea-ear left"></div>
        <div class="guinea-ear right"></div>
        <div class="guinea-face">
          <div class="guinea-eye left"></div>
          <div class="guinea-eye right"></div>
          <div class="guinea-nose"></div>
          <div class="guinea-mouth"></div>
        </div>
      </div>
    </header>

    <section class="panel controls">
      <h2>1. 모델 로드</h2>
      <button id="loadModelBtn" class="btn primary">모델 불러오기</button>
      <p id="modelStatus" class="status">아직 모델이 로드되지 않았습니다.</p>
      <p class="url">MODEL: UbWxdKHuG</p>
    </section>

    <section class="panel controls">
      <h2>2. 이미지 업로드 판독</h2>
      <input id="fileInput" type="file" accept="image/*" />
      <div class="preview-wrap">
        <img id="imagePreview" alt="업로드 미리보기" />
        <p id="previewHint">이미지를 업로드해 주세요</p>
      </div>
      <button id="predictImageBtn" class="btn" disabled>판독 시작</button>
    </section>

    <section class="panel result-panel">
      <h2>판독 결과</h2>
      <p id="topResult" class="top-result">결과를 기다리는 중...</p>
      <div id="resultBars" class="result-bars"></div>
    </section>
  </main>
</body>
</html>
