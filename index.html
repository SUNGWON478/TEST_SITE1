<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기니피그 강성원 판독기</title>
  <meta name="description" content="Teachable Machine 기반 이미지 판독 사이트" />
  <meta property="og:title" content="기니피그 강성원 판독기" />
  <meta property="og:description" content="사진 한 장 업로드하면 AI가 가장 높은 확률의 결과를 보여줍니다." />
  <meta property="og:image" content="https://storage.googleapis.com/proudcity/mebanenc/uploads/2021/03/guinea-pig-1-e1615584352233.jpg" />
  <meta property="og:type" content="website" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3282222164244318"
    crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <link href="/style.css" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script defer src="/main.js"></script>
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <header class="top-nav">
    <p>Guinea Lab</p>
    <span>Model: UbWxdKHuG</span>
  </header>

  <main class="app">
    <section class="hero">
      <p class="eyebrow">SMART IMAGE CLASSIFIER</p>
      <h1>기니피그 강성원 판독기</h1>
      <p class="hero-copy">사진 한 장 업로드하면 AI가 가장 높은 확률의 결과를 보여줍니다.</p>

      <div class="guinea" aria-hidden="true">
        <img id="guineaCutout" src="/G1.jpg" alt="" />
      </div>
    </section>

    <section class="card upload-card">
      <h2>사진 업로드</h2>
      <input id="fileInput" type="file" accept="image/*" />

      <div class="preview-wrap">
        <img id="imagePreview" alt="업로드 미리보기" />
        <p id="previewHint">이미지를 업로드해 주세요</p>
      </div>

      <button id="predictImageBtn" class="action" disabled>판독 시작</button>
      <p id="appState" class="hint">모델 준비 중...</p>
      <p id="modelStatus" class="sr-only" aria-live="polite">모델 준비 중...</p>
    </section>

    <section class="card result-card">
      <h2>판독 결과</h2>
      <p id="topResult" class="top-result">결과를 기다리는 중...</p>
      <div class="result-photo-wrap">
        <img id="resultPhoto" alt="판독 결과 이미지" />
      </div>
      <div id="resultBars" class="result-bars"></div>
    </section>
  </main>
</body>
</html>
